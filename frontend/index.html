<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="./src/images/safenotes_favicon.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SafeNotes - Secure encrypted notes" />
    <meta name="theme-color" content="#060e1e" />
    <title>SafeNotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lato:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS specific tags for a native look -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Safe Notes" />
    <link rel="apple-touch-icon" sizes="180x180" href="/app_icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/app_icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/app_icon.png" />

    <!-- Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
